<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lern</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --surface-color: #1e1e1e;
            --hover-color: #2c2c2c;
            --border-color: #444;
            --prereq-bg: #1a202c;
            --prereq-border: #2d3748;
            --svg-filter: invert(0.9) hue-rotate(180deg);
            --header-color: #ffffff;
        }

        body.light-mode {
            --bg-color: #ffffff;
            --text-color: #121212;
            --surface-color: #f9f9f9;
            --hover-color: #f0f0f0;
            --border-color: #ccc;
            --prereq-bg: #f0f4f8;
            --prereq-border: #d1d5db;
            --svg-filter: none;
            --header-color: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            font-size: 1.2rem;
        }
        #header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }
        #theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }
        #theme-toggle:hover {
            background: var(--hover-color);
        }
        #question {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            background: var(--surface-color);
            padding: 2rem;
            border-radius: 12px;
        }
        .alternative {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            background: var(--surface-color);
            color: var(--text-color);
            font-size: 1.2rem;
            transition: transform 0.1s, background-color 0.2s;
        }
        .alternative:hover {
            background: var(--hover-color);
            transform: translateY(-2px);
        }
        .alternative.selected {
            background: #2b6cb0;
            color: white;
            border-color: #2c5282;
        }
        svg {
            display: block;
            filter: var(--svg-filter);
        }
        .alternative {
            display: block;
            width: 100%;
            padding: 1.2rem;
            margin-bottom: 0.6rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            background: var(--surface-color);
            color: var(--text-color);
            font-size: 1.2rem;
            transition: transform 0.1s, background-color 0.2s;
        }
        button#prereq-btn, button#back-to-menu, button#toggle-alt-btn, button#prev-btn {
            background: var(--surface-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        button#prereq-btn:hover, button#back-to-menu:hover, button#toggle-alt-btn:hover, button#prev-btn:hover {
            background: var(--hover-color);
        }
        #prerequisites, #explanation {
            background: var(--prereq-bg);
            padding: 2rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--prereq-border);
        }
        #result {
            margin-top: 1rem;
            font-weight: bold;
        }
        button#next-btn {
            background: #2b6cb0;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
            display: none;
        }
        button#next-btn:hover {
            background: #2c5282;
        }
        h1, h2 {
            color: var(--header-color);
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            body {
                margin: 1rem auto;
                padding: 0 0.75rem;
                font-size: 1.1rem;
            }
            #question {
                padding: 1.2rem;
                margin-bottom: 1.5rem;
            }
            .alternative {
                padding: 1rem;
                font-size: 1.1rem;
                margin-bottom: 0.5rem;
            }
            #navigation-btns {
                flex-direction: column;
                gap: 0.75rem;
            }
            #navigation-btns button {
                width: 100%;
                padding: 0.8rem;
                font-size: 1.1rem;
            }
            #grade-btn {
                margin-left: 0 !important;
                order: -1; /* Place grade button at the top of the stack on mobile if needed, or keep it consistent */
            }
            #back-to-menu {
                padding: 0.6rem 0.8rem;
            }
            #prerequisites, #explanation {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div id="header">
        <button id="theme-toggle" title="Toggle Light/Dark Mode">
            <span id="theme-icon">🌙</span>
        </button>
    </div>
    <div id="app">
        <div id="menu">
            <h1>What do you want to learn?</h1>
            <div id="course-list"></div>
        </div>
        <div id="quiz" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <button id="back-to-menu">← Back to Menu</button>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <div id="question-label" style="display: none; background: #e53e3e; color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase;"></div>
                    <div id="question-number" style="font-weight: bold; color: var(--border-color);"></div>
                </div>
            </div>
            <div id="question">Loading...</div>
            <button id="prereq-btn" style="display: none; margin-bottom: 1rem;">Show Prerequisites</button>
            <button id="toggle-alt-btn" style="margin-bottom: 1rem;">Hide Alternatives</button>
            <div id="prerequisites" style="display: none;"></div>
            <div id="alternatives"></div>
            <div id="explanation" style="display: none;"></div>
            <div id="result"></div>
            <div id="navigation-btns" style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button id="prev-btn" style="display: none;">← Previous</button>
                <button id="next-btn">Next Question →</button>
                <button id="grade-btn" style="margin-left: auto; background: #38a169; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;">Grade Quiz</button>
            </div>
            <div id="final-results" style="display: none; margin-top: 2rem;">
                <h2 style="text-align: center;">Quiz Results</h2>
                <div id="score-container" style="text-align: center; margin-bottom: 2rem;">
                    <p id="final-score" style="font-size: 2rem; margin-bottom: 0.5rem;"></p>
                    <p id="percentage-score" style="font-size: 1.5rem; color: #38a169;"></p>
                </div>
                <div id="incorrect-review" style="display: none;">
                    <h3>Review Incorrect Answers:</h3>
                    <div id="incorrect-list"></div>
                </div>
                <button id="restart-btn" class="alternative" style="margin-top: 2rem;">Back to Menu</button>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js?v=2"></script>
</body>
</html>
